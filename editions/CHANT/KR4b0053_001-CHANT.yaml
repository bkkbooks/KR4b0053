body:
  text: 卷一為王嫡子侍皇太子釋奠宴在昔歸運阻亂弘多夷山製宇盪海為家風雲改族日月增華欽聖茲遠懷道茲沖踐言動俗果行移風進往一簣啟或三蒙冰實因水金亦在鎔惟神知化在物立言樂正雅頌咸被後昆告奠明祀觀道聖門日月不息師表常尊類聚三十八作侍皇太子釋奠宴詩引多家華言昆門尊七韻初學記十四作為王子侍皇太子釋奠詩引沖風蒙鎔言昆門尊八韻詩紀七十八贈王僧孺惟子見知惟余知子觀行視言要終猶始敬之重之如蘭如芷形應影隨曩行今止百行之首立人斯著子之有之誰毀誰譽脩名既立老至何遽誰其執鞭吾為子御劉略班藝虞志荀錄伊昔有懷交相欣勖下帷無倦升高有屬嘉爾晨燈惜余夜燭梁書王僧孺傳南史王僧孺傳詩紀七十八答劉居士君子之道亦有其四高行絕俗盛德出類才同文錦學非書肆望之可階即之難至輟精天理躔象少微人與俗異道與人違庭飛熠燿室滿伊威行無轍跡理絕心機類聚三十六詩紀七十八九日侍宴樂遊苑帝德峻韶夏王功書頌平共貫沿五勝獨道邁三英我皇撫歸運時乘信告成一唱華鍾石再撫被絲笙黃草歸雒木梯山薦玉榮時來濁河變瑞起溫洛清物色動宸眷民豫降皇情類聚四廣文選八詩紀七十八奉和登景陽山奉和登景陽山物色感神遊升高悵有閱南望銅駞街北走長楸埒別澗宛滄溟疏山駕瀛碣奔鯨吐華浪司南動輕枻日下重門照雲開九華澈觀閣隆舊恩奉圖愧前哲類聚七文苑英華百五十九詩紀七十八泛長溪狥祿聚歸糧依隱謝羈勒絕物甘離群長懷思去國長溪永東舍震區窮水域道遇垂綸叟聊訪問津惑弭楫申九言無為累牽纆長泛滄浪水平明至曛黑類聚九文苑英華百六十六詩紀七十八落日泛舟東溪黝黝桑柘繁芃芃麻麥盛交柯溪易陰反景澄餘映吾生雖有待樂天庶知命不學梁甫吟唯識滄浪詠田荒我有役秩滿余謝病類聚九文苑英華百六十六詩紀七十八濟浙江昧旦乘輕風江湖忽來往或與歸波送乍逐翻流上近岸無暇目遠峰更興想綠樹懸宿根丹崖頹久壤類聚八文苑英華百六十二詩紀七十八贈郭桐廬出谿口見候余既未至郭仍進村維舟久之郭生方至朝發富春渚蓄意忍相思涿令行春反冠蓋溢川坻望久方來萃悲懽不自持滄江路窮此湍險方自茲疊嶂易成響重以夜猿悲客心幸自弭中道遇心期親好自斯絕孤遊從此辭文選二十六詩紀七十八答何徵君散誕羈鞿外拘束名教裏得性千乘同山林無朝市勿以耕蠶貴空笑易農士宿昔仰高山超然絕塵軌傾壺已等樂命管亦齊喜無為嘆獨遊若終方同止類聚三十六文苑英華二百三十詩紀七十八贈徐徵君促生悲永路早交傷晚別自我隔容徽於焉徂歲月情非山河阻意似江湖悅東皋有儒素杳與榮名絕曾是違賞心曷用箴余缺眇焉追平生塵書廢不閱信此伊能已懷抱豈暫輟何以表相思貞松擅嚴節類聚三十六文苑英華二百三十詩紀七十八答劉孝綽閱水既成瀾藏舟遂移壑彼美洛陽子投我懷秋作久敬類誠言吹噓似嘲謔兼稱夏雲盡復陳秋樹索詎慰耋嗟人徒深老夫託直史兼褒貶轄司專疾惡九折多美疹匪報庶良藥子其崇鋒穎春耕勵秋穫南史劉勔傳附孝綽傳引作託惡藥穫五韻又類聚三十一文苑英華二百四十引壑作謔索託五韻又梁書謝舉傳作秘書監任昉出為新安郡別舉詩引託一韻詩紀七十八答到建安餉杖故人有所贈稱以冒霜筠定是湘妃淚潛灑遂鄰彬扶危復防咽事歸薄暮人勞君尚齒意矜此杖鄉辰復資後坐彥候余方欠伸獻君千里笑紓我百憂嚬坐適雖有器臥遊苦無津何由乘此竹直見平生親類聚六十九詩紀七十八寄到溉鐵錢兩當一百代易名實為惠當及時無待涼秋日南史到彥之傳附溉傳詩紀七十八別蕭諮議衍離燭有窮輝別念無終緒歧言未及申離目已先舉揆景巫衡阿臨風長楸浦浮雲難嗣音徘徊悵誰與儻有關外驛聊訪狎鷗渚類聚二十九作任昉詩古文苑九文苑英華二百八十六作別詩廣文選八詩紀七十八厲吏人講學厲吏人講學暮燭迫西榆將落誡南畝曰余本疎惰頹暮積榆柳踐境渴師臣臨政欽益友旰食願橫經終朝思擁帚雖欣辨蘭艾何用闢蒿莠類聚五十五初學記二十一詩紀七十八苦熱旭旦煙雲卷烈景入東軒傾光望轉蕙斜日照西垣既卷蕉梧葉復傾葵藿根重簟無冷氣挾石似懷溫霢霂類珠綴喘嚇狀雷奔類聚五文苑英華二百十樂府詩集六十五作苦熱行詩紀七十八同謝朏花雪土膏候年動積雪表晨暮散葩似浮玉飛英若總素東序皆白珩西雝盡翔鷺山經陋蜜榮騷人貶瓊樹類聚二文苑英華百五十四作和謝朏花雪詩紀七十八出郡傳舍哭范僕射三首出郡傳舍哭范僕射三首平生禮數絕式瞻在國楨一朝萬化盡猶我故人情待時屬興運王佐俟民英結懽三十載生死一交情攜手遁衰孽接景事休明運阻衡言革時泰玉階平濬沖得茂彥夫子值狂生伊人有涇渭非余揚濁清將乖不忍別欲以遣離情不忍一辰意千齡萬恨生已矣平生事詠歌盈篋笥兼復相嘲謔常與虛舟值何時見范侯還敘平生意與子別幾辰經塗不盈旬弗覩朱顏改徒想平生人寧知安歌日非君撤瑟晨已矣余何歎輟舂哀國均文選二十三初學記十一詩紀七十八又類聚三十四作哭范僕射詩引一二兩章嚴陵瀨群峰此峻極參差百重嶂清淺既漣漪激石復奔壯神物徒有造終然莫能狀類聚八文苑英華百六十四詩紀七十八詠池邊桃已謝西王苑復揖綏山枝聊逢賞者愛棲趾傍蓮池開紅春灼灼結實夏離離類聚八十六詩紀七十八
